server.port=${PORT:8080}
spring.config.import=optional:file:.env[.properties]

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aethervault}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:aethervault-development-secret-key-2026}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Uploads
app.upload-dir=${UPLOAD_DIR:uploads}

# Node Backend
node.backend-url=${NODE_BACKEND_URL:http://localhost:5000}

# Frontend CORS
frontend.url=${FRONTEND_URL:}

# Default Admin
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.email=${ADMIN_EMAIL:admin@aethervault.local}
app.admin.password=${ADMIN_PASSWORD:admin123}

# Multipart Upload Limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Logging
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO

# OpenAPI / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
